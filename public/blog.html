    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500;600;700;900&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <style>
        .blog-post-view {
            padding-top: 140px;
            padding-bottom: 100px;
            background: var(--bg-base);
        }

        .post-header {
            max-width: 1100px;
            margin: 0 auto 4rem;
            display: flex;
            align-items: center;
            gap: 4rem;
            text-align: left;
        }

        .post-header-content {
            flex: 1;
        }

        .post-header-image {
            flex: 1;
            max-width: 500px;
        }

        .post-category {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-cyan);
            margin-bottom: 1.5rem;
            display: inline-block;
            background: rgba(6, 182, 212, 0.08);
            padding: 6px 16px;
            border-radius: 4px;
        }

        .post-title {
            font-size: 2.8rem;
            line-height: 1.2;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1.5rem;
        }

        .post-meta {
            font-size: 1rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-author-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--brand-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .post-main-image {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .post-content {
            max-width: 750px;
            margin: 0 auto;
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .post-content h2,
        .post-content h3 {
            color: var(--text-main);
            margin: 2.5rem 0 1rem;
            font-weight: 700;
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 2rem 0;
            box-shadow: var(--shadow-md);
        }

        .post-skeleton {
            background: #f1f5f9;
            height: 20px;
            border-radius: 4px;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        @media (max-width: 991px) {
            .post-header {
                flex-direction: column;
                text-align: center;
                gap: 2rem;
            }

            .post-header-image {
                max-width: 100%;
            }

            .post-title {
                font-size: 2.25rem !important;
            }

            .post-meta {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .blog-post-view {
                padding-top: 100px;
            }

            .container {
                padding: 0 24px;
            }
        }
    </style>
</head>

<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NXT8BGS9"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    <!-- Header -->
    <script src="js/components.js?v=9.0"></script>
    <clinera-header></clinera-header>

    <main class="blog-post-view">
        <div class="container">
            <div id="postContainer">
                <!-- Skeleton Loader -->
                <div class="post-header">
                    <div class="post-header-content">
                        <div class="post-skeleton" style="width: 100px; margin-bottom: 10px;"></div>
                        <div class="post-skeleton" style="height: 60px; width: 90%; margin-bottom: 20px;"></div>
                        <div class="post-skeleton" style="width: 150px;"></div>
                    </div>
                    <div class="post-header-image">
                        <div class="post-skeleton" style="aspect-ratio: 4/3; width: 100%; border-radius:12px;"></div>
                    </div>
                </div>
                <div class="post-content">
                    <div class="post-skeleton"></div>
                    <div class="post-skeleton"></div>
                    <div class="post-skeleton" style="width: 60%;"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Script de carga dinámica -->
    <script>
        const AI_ENDPOINT = "https://script.google.com/macros/s/AKfycbwJKtkMCOV8nDh3J5ngXzmU39xiB9zXbs6zFm5bTV1rlo6WKzm_XZXFFOzgEjEuIKF-/exec";
        const APP_TOKEN = "Clinera_Internal_Secure_Key_2026";

        async function loadPost() {
            // Obtener el ID del post desde la URL (blog.html?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');

            if (!postId) {
                window.location.href = 'ayuda.html';
                return;
            }

            try {
                // Pedimos los datos del blog al script centralizado
                const res = await fetch(AI_ENDPOINT, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'get_blogs', token: APP_TOKEN })
                });

                const blogs = await res.json();
                // Buscamos el post específico (usando el índice o una propiedad 'slug')
                const post = blogs[postId];

                if (!post) throw new Error("Post no encontrado");

                renderPost(post);
            } catch (error) {
                console.error(error);
                document.getElementById('postContainer').innerHTML = `
                    <div style="text-align:center; padding: 100px 0;">
                        <h1>Ups! No encontramos este artículo</h1>
                        <a href="ayuda.html" style="color:var(--brand-cyan);">Volver al Centro de Ayuda</a>
                    </div>
                `;
            }
        }

        function autoFormatContent(text) {
            if (!text) return "";

            // Si el texto ya tiene HTML (como etiquetas <p> o <div>), no lo tocamos
            if (text.includes('<p>') || text.includes('</div>') || text.includes('<br>')) return text;

            // 1. Detectar Subtítulos: ## Texto -> <h2>Texto</h2> (Estilo Markdown)
            let formatted = text.replace(/^## (.*$)/gm, '<h2 style="font-size:1.8rem; margin-top:3rem; color:var(--text-main); font-weight:800;">$1</h2>');

            // 2. Detectar Negritas: *Texto* -> <strong>Texto</strong>
            formatted = formatted.replace(/\*(.*?)\*/g, '<strong style="color:var(--text-main); font-weight:600;">$1</strong>');

            // 3. Crear Párrafos: Doble salto de línea -> <p>
            return formatted.split('\n\n').map(p => {
                if (p.trim().startsWith('<h2')) return p; // No envolver h2 en p
                return `<p style="margin-bottom:1.8rem; line-height:1.8;">${p.replace(/\n/g, '<br>')}</p>`;
            }).join('');
        }

        function renderPost(post) {
            // 1. Actualizar Meta Tags SEO
            document.title = `${post.title} | Blog Clinera`;
            document.querySelector('meta[name="description"]').setAttribute("content", post.excerpt || post.title);

            const container = document.getElementById('postContainer');

            // Procesamos el contenido con nuestro formateador inteligente
            let richContent = autoFormatContent(post.full_content || post.excerpt);

            container.innerHTML = `
                <article>
                    <div class="post-header">
                        <div class="post-header-content">
                            <span class="post-category">${post.category || 'Novedades'}</span>
                            <h1 class="post-title">${post.title}</h1>
                            <div class="post-meta">
                                <div class="post-author-img">C</div>
                                <span>Escrito por: <strong>Team Clinera</strong></span>
                            </div>
                        </div>
                        <div class="post-header-image">
                            ${post.image ? `<img src="${post.image}" class="post-main-image" alt="${post.title}">` : ''}
                        </div>
                    </div>
                    
                    <div class="post-content">
                        <p style="color:var(--text-muted); font-size:1.2rem; line-height:1.6; margin-bottom:2.5rem; font-style: italic; border-left: 4px solid var(--brand-cyan); padding-left: 1.5rem;">
                            ${post.excerpt || ''}
                        </p>
                        ${richContent}
                    </div>
                    
                    <div style="margin-top: 6rem; text-align:center; border-top: 1px solid rgba(0,0,0,0.05); padding: 4rem 2rem;">
                        <h2 style="margin-bottom: 0.5rem; font-weight:800; font-size:1.8rem;">¿Te fue útil este artículo?</h2>
                        <p style="margin-bottom: 2.5rem; color:var(--text-secondary); font-size:1.1rem;">Si tienes más dudas, puedes explorar otros temas o contactar a soporte.</p>
                        <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
                            <a href="ayuda.html" class="btn" style="background:#f4f4f5; color:var(--text-main); padding: 14px 30px; border-radius:50px; font-weight:600;">Volver a Ayuda</a>
                            <a href="https://wa.me/56985581524" class="btn btn-primary" style="padding: 14px 30px; border-radius:50px; box-shadow: 0 4px 15px rgba(6,182,212,0.2);">Hablar con Soporte</a>
                        </div>
                    </div>
                </article>
            `;
        }

        window.onload = loadPost;
    </script>
</body>

</html>

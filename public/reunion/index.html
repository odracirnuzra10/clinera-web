  <style>
    :root {
      --bg-ice: #FAFBFC;
      --bg-panel: #FFFFFF;
      --ink: #111318;
      --ink-soft: #3D4250;
      --ink-muted: #9CA3AF;
      --brand-mint: #10B981;
      --brand-cyan: #009FE3;
      --brand-violet: #7C3AED;
      --brand-magenta: #C850C0;
      --grad-ia: linear-gradient(135deg, #009FE3 0%, #7C3AED 50%, #C850C0 100%);
      --border-sterile: rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
      --shadow-xl: 0 20px 40px -8px rgba(0, 0, 0, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      overflow-x: hidden;
      max-width: 100%;
    }
    html {
      scroll-behavior: smooth;
      background: var(--bg-ice);
    }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-ice);
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);

    /* NAV */
    .nav-wrap {
      border-bottom: 1px solid var(--border-sterile);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(250, 251, 252, 0.9);
    }
    .nav {
      max-width: 1160px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--ink);
    }
    .nav-logo img { height: 26px; width: auto; display: block; }
    .nav-cta {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 700; color: #fff;
      background: var(--grad-ia);
      padding: 10px 22px; border-radius: 10px;
      text-decoration: none; white-space: nowrap;
      transition: transform 120ms ease, box-shadow 200ms, filter 200ms;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.28);
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(124, 58, 237, 0.38); filter: brightness(1.04); }

    /* HERO */
    .hero {
      max-width: 1160px;
      margin: 0 auto;
      padding: 56px 24px 28px;
      text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute; inset: -40px auto auto 50%;
      transform: translateX(-50%);
      width: min(720px, 90%); height: 360px;
      background: radial-gradient(ellipse at center,
        rgba(0, 159, 227, 0.08),
        rgba(124, 58, 237, 0.06) 40%,
        rgba(200, 80, 192, 0.04) 70%,
        transparent 85%);
      filter: blur(30px);
      pointer-events: none;
      z-index: -1;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px 6px 10px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.22);
      border-radius: 9999px;
      font-family: 'Source Code Pro', monospace;
      font-size: 12px; color: #047857; font-weight: 500;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }
    .hero-eyebrow .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--brand-mint);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
    .hero h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(30px, 4.2vw, 46px);
      font-weight: 800;
      letter-spacing: -0.028em;
      line-height: 1.08;
      margin-bottom: 16px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
      color: var(--ink);
    }
    .hero h1 .accent {
      background: var(--grad-ia);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {

      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 560px;
      margin: 0 auto;
      padding: 0 8px;
    }

    /* Cal embed container */
    .cal-wrap {

    #my-cal-inline-marketing {

  <!-- Meeting-booked tracking -->
  <script>
    window.dataLayer = window.dataLayer || [];
    const PAGE_META = {
      page_path: '/reunion',
      page_name: 'reunion_cal_booking',
      content_name: 'Cal - Reunión Marketing',
      content_category: 'booking',
      currency: 'USD'
    };
    window.dataLayer.push({ event: 'page_view', ...PAGE_META });

    // Cal.com postmessage listener — fires Lead when a booking is confirmed
    (function () {
      let bookingFired = false;
      window.addEventListener('message', function (ev) {
        try {
          if (!ev.data) return;
          const data = typeof ev.data === 'string' ? JSON.parse(ev.data) : ev.data;
          // Cal sends { type: "bookingSuccessful", ... } on successful booking
          if (data && (data.type === 'bookingSuccessful' || data.action === 'bookingSuccessful')) {
            if (bookingFired) return;
            bookingFired = true;
            window.dataLayer.push({
              event: 'booking_confirmed',
              ...PAGE_META
            });
            if (typeof fbq === 'function') {
              fbq('track', 'Schedule', { content_name: 'Cal - Reunión Marketing', content_category: 'booking' });
              fbq('track', 'Lead', { content_name: 'Cal - Reunión Marketing', content_category: 'booking', currency: 'USD', value: 0 });
            }
          }
        } catch (e) { /* ignore */ }
      });
    })();

    // fbclid capture → _fbc cookie + enrich register links
    (function(){
      function getCookie(name){
        var m = document.cookie.match(new RegExp('(?:^|;\\s*)' + name.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&') + '=([^;]*)'));
        return m ? m[1] : '';
      }
      function setCookie(name, value, days){
        var d = new Date(); d.setTime(d.getTime() + days*86400000);
        document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
      }
      var qs = new URLSearchParams(window.location.search);
      var fbclid = qs.get('fbclid');
      if (fbclid) {
        if (!getCookie('_fbc')) setCookie('_fbc', 'fb.1.' + Date.now() + '.' + fbclid, 90);
        setCookie('fbclid', fbclid, 90);
      }
      ['gclid','utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(function(k){
        var v = qs.get(k); if (v) setCookie(k, v, 90);
      });
      document.querySelectorAll('a[href*="app.clinera.io/auth/register"]').forEach(function(a){
        a.addEventListener('click', function(){
          try {
            var u = new URL(a.href, window.location.origin);
            [['fbclid',getCookie('fbclid')||qs.get('fbclid')||''],
             ['gclid',getCookie('gclid')||qs.get('gclid')||''],
             ['utm_source',getCookie('utm_source')||qs.get('utm_source')||''],
             ['utm_medium',getCookie('utm_medium')||qs.get('utm_medium')||''],
             ['utm_campaign',getCookie('utm_campaign')||qs.get('utm_campaign')||''],
             ['utm_term',getCookie('utm_term')||qs.get('utm_term')||''],
             ['utm_content',getCookie('utm_content')||qs.get('utm_content')||'']
            ].forEach(function(p){ if (p[1]) u.searchParams.set(p[0],p[1]); });
            var fbc = getCookie('_fbc'); if (fbc) u.searchParams.set('_fbc', fbc);
            var fbp = getCookie('_fbp'); if (fbp) u.searchParams.set('_fbp', fbp);
            a.href = u.toString();
          } catch(e){}
        }, { capture: true });
      });
    })();
  </script>
